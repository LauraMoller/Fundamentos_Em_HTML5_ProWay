<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício de Links</title>
</head>

<body>
    <h1>Exercício de Links em HTML</h1>

    <p>1. Link simples para o site do Google: </p>
    <a href="https://www.google.com" target="_blank">Google</a>

    <p>2. Link para o YouTube que abra em uma nova aba: </p>
    <a href="https://www.youtube.com" target="_blank">YouTube</a>

    <p>3. Imagem com link para Wikipédia: </p>
    <a href="https://pt.wikipedia.org">
        <img src="img/logoWikipedia.png" alt="Logo da Wikipédia">
    </a>

    <p>4. Link para enviar e-mail: </p>
    <a href="mailto: exe@gmail.com">Enviar e-mail</a>

</body>

</html>
